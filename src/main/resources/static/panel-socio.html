<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Flex - Mi Panel</title>
    
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores Dark Mode */
        :root {
            --gym-yellow: #fce300;
            --gym-yellow-hover: #d9c300;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(252, 227, 0, 0.10), transparent 30%),
                linear-gradient(180deg, #111111 0%, #070707 100%);
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Navbar personalizada */
        .navbar {
            background: rgba(20, 20, 20, 0.92) !important;
            border-bottom: 1px solid rgba(252, 227, 0, 0.35);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        /* Tarjeta principal */
        .card {
            background: rgba(20, 20, 20, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid var(--gym-yellow);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
        }

        /* Caja de Info de Cuota */
        .info-box {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(252, 227, 0, 0.06));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 4px solid var(--gym-yellow);
            border-radius: 18px;
        }

        /* Botón Gym Principal */
        .btn-gym {
            background-color: var(--gym-yellow);
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            border-radius: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 14px 30px rgba(252, 227, 0, 0.16);
        }

        .btn-gym:hover {
            background-color: var(--gym-yellow-hover);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(252, 227, 0, 0.3);
        }

        .btn-gym:disabled {
            background-color: #777;
            color: #ccc;
            transform: none;
            box-shadow: none;
        }

        .badge {
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .badge.bg-success {
            background-color: rgba(34, 197, 94, 0.16) !important;
            color: #86efac !important;
            border: 1px solid rgba(34, 197, 94, 0.32);
        }

        .badge.bg-danger {
            background-color: rgba(239, 68, 68, 0.16) !important;
            color: #fca5a5 !important;
            border: 1px solid rgba(239, 68, 68, 0.32);
        }

        .btn-outline-danger,
        .btn-outline-secondary {
            border-radius: 14px;
            border-width: 1.5px;
            transition: all 0.25s ease;
        }

        .btn-outline-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.18);
        }

        .btn-outline-secondary:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- NAVBAR SOCIO -->
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand d-flex align-items-center mb-0 h1">
                <img src="storiesdown.webp" alt="Logo Gym Flex" style="height: 40px; border-radius: 4px;" class="me-2">
                Gym Flex
            </span>
            <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cerrarSesion()">
                <i class="bi bi-box-arrow-right"></i> Salir
            </button>
        </div>
    </nav>

    <!-- PANEL PRINCIPAL -->
    <div class="container my-5" style="max-width: 600px;">
        <div class="card shadow-lg border-0">
            <div class="card-body text-center p-4 p-md-5">
                
                <!-- Icono de perfil -->
                <i class="bi bi-person-circle display-1 mb-3 d-inline-block" style="color: var(--gym-yellow);"></i>
                
                <h2 id="saludoSocio" class="mb-4 text-white">¡Hola!</h2>
                
                <!-- Info de Cuota -->
                <div class="p-4 info-box mb-5 text-start shadow-sm">
                    <h5 class="text-white mb-2"><i class="bi bi-wallet2 me-2" style="color: var(--gym-yellow);"></i> Gestión de Cuota</h5>
                    <p class="mb-1 text-secondary" style="font-size: 1.1rem;">Valor mensual: <strong id="valorCuota" class="text-white"></strong></p>
                </div>

                <!-- Botón de Pago -->
                <button id="btnPagar" class="btn btn-gym btn-lg w-100 mb-3 py-3" onclick="generarPago()">
                    <i class="bi bi-credit-card-fill me-2"></i> Pagar Cuota con Mercado Pago
                </button>
                
                <div id="pagoAlert"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Verificación de Seguridad: Al abrir la página revisamos si hay token
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("jwt_token");
            const nombre = localStorage.getItem("usuario_nombre");

            if (!token) {
                // Si no hay token, lo echamos al login
                window.location.href = "index.html";
                return;
            }

            // Saludamos al socio
            document.getElementById("saludoSocio").innerText = `¡Hola, ${nombre}!`;
        });

        // 2. Función para generar el link de Mercado Pago
        async function generarPago() {
            const token = localStorage.getItem("jwt_token");
            const dni = localStorage.getItem("usuario_dni");
            const btn = document.getElementById("btnPagar");
            const alertContainer = document.getElementById("pagoAlert");

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Generando pago seguro...`;
            alertContainer.innerHTML = "";

            try {
                const response = await fetch("/api/pagos/mercado-pago/link", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` // Inyectamos el JWT
                    },
                    body: JSON.stringify({
                        dniSocio: dni,
                        monto: 15000.0 // Monto fijo o dinámico
                    })
                });

               if (response.ok) {
                    // 1. Le decimos que lo que recibe es un JSON
                    const data = await response.json(); 
                    
                    // 2. Ingresamos a la propiedad 'url' de ese JSON y redirigimos
                    window.location.href = data.url; 
                } else {
                    const error = await response.text();
                    mostrarError(`Error de Mercado Pago: ${error}`);
                }
            } catch (error) {
                mostrarError("No se pudo contactar al servidor de pagos.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-credit-card-fill me-2"></i> Pagar Cuota con Mercado Pago`;
            }
        }

        function mostrarError(msj) {
            // Error adaptado para Dark Mode
            document.getElementById("pagoAlert").innerHTML = `
                <div class="alert bg-danger text-white border-0 mt-4 shadow-sm text-start">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> ${msj}
                </div>
            `;
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
