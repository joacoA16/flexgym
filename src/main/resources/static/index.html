<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Flex - Iniciar Sesión</title>
    
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts (Oswald para un look más deportivo, Roboto para lectura) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores basada en el logo */
        :root {
            --gym-yellow: #fce300;
            --gym-yellow-hover: #d9c300;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --input-bg: #1f1f1f;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
        }

        h4 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Estilo de la tarjeta principal */
        .login-card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-top: 4px solid var(--gym-yellow);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* Contenedor del Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            border-radius: 8px; /* Por si la imagen tiene bordes duros */
        }

        /* Inputs y Selects adaptados al Dark Mode */
        .form-label {
            color: #aaaaaa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            padding: 0.75rem 1rem;
        }

        .form-control:focus, .form-select:focus {
            background-color: #252525;
            border-color: var(--gym-yellow);
            box-shadow: 0 0 0 0.25rem rgba(252, 227, 0, 0.25);
            color: #fff;
        }

        .form-control::placeholder {
            color: #666;
        }

        /* Flecha blanca para el select en modo oscuro */
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        /* Botón de ingreso */
        .btn-gym {
            background-color: var(--gym-yellow);
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .btn-gym:hover {
            background-color: var(--gym-yellow-hover);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(252, 227, 0, 0.3);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card login-card p-4" style="width: 100%; max-width: 420px;">
        
        <!-- Implementación del logo -->
        <div class="logo-container">
            <img src="storiesdown.webp" alt="Logo Gym Flex">
        </div>

        <div class="text-center mb-4">
            <h4 class="mb-0"><i class="bi bi-door-open-fill text-warning me-2" style="color: var(--gym-yellow) !important;"></i>Ingreso al Sistema</h4>
        </div>
        
        <div class="card-body p-0">
            <form id="loginForm">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Perfil</label>
                    <select id="perfilSelect" class="form-select">
                        <option value="socio">Socio</option>
                        <option value="profe">Profesor / Admin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tu DNI</label>
                    <input type="text" id="dniInput" class="form-control" placeholder="Ej: 40123456" required autocomplete="off">
                </div>
                
                <div class="mb-4" id="divPassword" style="display: none;">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Clave de administrador">
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-gym">Entrar</button>
                </div>
            </form>
            
            <div id="loginAlert" class="mt-3"></div>
        </div>
    </div>

    <script>
        // Lógica para mostrar/ocultar la contraseña según el perfil
        const perfilSelect = document.getElementById("perfilSelect");
        const divPassword = document.getElementById("divPassword");

        perfilSelect.addEventListener("change", () => {
            if (perfilSelect.value === "profe") {
                divPassword.style.display = "block";
            } else {
                divPassword.style.display = "none";
            }
        });

        // Lógica del envío del formulario
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const dni = document.getElementById("dniInput").value.trim();
            const perfil = perfilSelect.value;
            const password = document.getElementById("passwordInput").value.trim();
            const alertContainer = document.getElementById("loginAlert");
            
            const url = perfil === "socio" ? "/api/auth/socio" : "/api/auth/profe";

            // Armamos el payload dinámicamente: Si es profe mandamos la clave, si es socio solo el DNI
            const payload = perfil === "socio" ? { dni: dni } : { dni: dni, password: password };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("usuario_nombre", data.nombre);
                    localStorage.setItem("usuario_dni", dni);
                    
                    if (data.rol === "ROLE_SOCIO") {
                        window.location.href = "panel-socio.html";
                    } else {
                        window.location.href = "panel-profe.html";
                    }
                } else {
                    mostrarAlerta("Credenciales incorrectas o error de acceso.", "danger");
                }
            } catch (error) {
                mostrarAlerta("No se pudo conectar con el servidor.", "danger");
            }
        });

        function mostrarAlerta(mensaje, tipo) {
            // Ajustamos las alertas para que combinen con el modo oscuro
            const bgClass = tipo === 'danger' ? 'bg-danger text-white border-0' : `alert-${tipo}`;
            document.getElementById("loginAlert").innerHTML = `<div class="alert ${bgClass} shadow-sm">${mensaje}</div>`;
        }
    </script>
</body>
</html>
