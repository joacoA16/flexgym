<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Flex - Buscador de Socios</title>
    
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores Dark Mode */
        :root {
            --gym-yellow: #fce300;
            --gym-yellow-hover: #d9c300;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --input-bg: #1f1f1f;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(252, 227, 0, 0.10), transparent 30%),
                linear-gradient(180deg, #111111 0%, #070707 100%);
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Navbar personalizada */
        .navbar {
            background: rgba(20, 20, 20, 0.92) !important;
            border-bottom: 1px solid rgba(252, 227, 0, 0.35);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        .nav-link.active {
            color: var(--gym-yellow) !important;
            font-weight: bold;
        }

        /* Tarjetas principales */
        .card {
            background: rgba(20, 20, 20, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid var(--gym-yellow);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
        }

        /* Inputs y Selects */
        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            border-radius: 14px;
            padding: 0.9rem 1rem;
        }

        .form-control:focus, .form-select:focus {
            background-color: #252525;
            border-color: var(--gym-yellow);
            box-shadow: 0 0 0 0.25rem rgba(252, 227, 0, 0.25);
            color: #fff;
        }

        .form-control::placeholder {
            color: #666;
        }

        .input-group-text {
            background-color: #333;
            border: 1px solid #333;
            color: var(--gym-yellow);
            border-radius: 14px;
        }

        /* Flecha blanca para el select en modo oscuro */
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        /* Tabla oscura */
        .table-dark {
            background-color: rgba(20, 20, 20, 0.92);
            margin-bottom: 0;
        }
        
        .table-dark th {
            color: var(--gym-yellow);
            border-bottom: 2px solid var(--gym-yellow);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        
        .table-dark td {
            background-color: rgba(26, 26, 26, 0.92);
            border-color: #333;
            color: #eaeaea;
        }

        .table-dark tbody tr:hover td {
            background-color: #20242b;
        }

        .badge {
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .badge.bg-success {
            background-color: rgba(34, 197, 94, 0.16) !important;
            color: #86efac !important;
            border: 1px solid rgba(34, 197, 94, 0.32);
        }

        .badge.bg-danger {
            background-color: rgba(239, 68, 68, 0.16) !important;
            color: #fca5a5 !important;
            border: 1px solid rgba(239, 68, 68, 0.32);
        }

        /* Modal oscuro */
        .modal-content {
            background-color: rgba(20, 20, 20, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        }

        .modal-header {
            border-bottom: 1px solid #333;
        }

        .modal-header .modal-title i {
            color: var(--gym-yellow);
        }

        .modal-footer {
            border-top: 1px solid #333;
        }
        
        .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* Botón Gym Principal */
        .btn-gym {
            background-color: var(--gym-yellow);
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            transition: all 0.3s ease;
            border-radius: 14px;
            box-shadow: 0 14px 30px rgba(252, 227, 0, 0.16);
        }

        .btn-gym:hover {
            background-color: var(--gym-yellow-hover);
            color: #000;
            transform: translateY(-2px);
        }

        .btn-outline-secondary,
        .btn-outline-danger,
        .btn-outline-warning {
            border-radius: 14px;
            border-width: 1.5px;
            transition: all 0.25s ease;
        }

        .btn-outline-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.18);
        }

        .btn-success,
        .btn-outline-secondary {
            border-radius: 14px;
            transition: all 0.25s ease;
        }

        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.18);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <!-- Logo miniatura en la Navbar -->
            <span class="navbar-brand d-flex align-items-center">
                <img src="storiesdown.webp" alt="Logo" style="height: 35px; border-radius: 4px;" class="me-2">
                Panel Admin
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
             <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="buscar-socios.html"><i class="bi bi-search"></i> Buscador</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="panel-profe.html"><i class="bi bi-card-checklist"></i> Enviar Rutina</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="agregar-socio.html"><i class="bi bi-person-plus"></i> Nuevo Socio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#modalPrecio" onclick="cargarPrecioActual()">
                            <i class="bi bi-currency-dollar"></i> Precio Cuota
                        </a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card shadow-lg">
            <div class="card-body p-4 p-md-5">
                <h3 class="mb-4 text-white"><i class="bi bi-people-fill me-2" style="color: var(--gym-yellow);"></i> Directorio de Socios</h3>

                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control" placeholder="Buscar por Nombre, Apellido o DNI..." autocomplete="off">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="statusFilter" class="form-select form-select-lg">
                            <option value="todos">Todos los Estados</option>
                            <option value="activa">Cuota Al Día</option>
                            <option value="vencida">Cuota Vencida</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive border border-secondary rounded">
                    <!-- Cambiado a table-dark para fondo oscuro -->
                    <table class="table table-dark table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Socio</th>
                                <th>Teléfono</th>
                                <th>Vencimiento Cuota</th>
                                <th>Estado</th>
                                <th class="text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaSocios">
                            <tr><td colspan="6" class="text-center text-secondary py-4">Cargando socios...</td></tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal de Precio Cuota (Adaptado) -->
    <div class="modal fade" id="modalPrecio" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-tag-fill me-2"></i> Actualizar Precio de Cuota</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-secondary mb-4">Este será el valor global que se cobrará en Mercado Pago y Efectivo.</p>
                    <div class="input-group input-group-lg mb-3">
                        <span class="input-group-text fw-bold">$</span>
                        <input type="number" id="inputPrecio" class="form-control" placeholder="Cargando...">
                    </div>
                    <div id="alertaPrecio"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-gym px-4" onclick="guardarNuevoPrecio()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let todosLosSocios = [];

        // 1. Verificación de seguridad y carga inicial
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("jwt_token");
            if (!token) {
                alert("Sesión expirada. Por favor, inicia sesión.");
                window.location.href = "index.html"; 
                return;
            }
            await cargarSocios(token);
        });

        // 2. Traer los socios desde Spring Boot
        async function cargarSocios(token) {
            try {
                const response = await fetch("/api/socios", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    todosLosSocios = await response.json();
                    aplicarFiltros(); 
                } else {
                    document.getElementById("tablaSocios").innerHTML = `<tr><td colspan="6" class="text-danger text-center py-4">Error al obtener los datos.</td></tr>`;
                }
            } catch (error) {
                document.getElementById("tablaSocios").innerHTML = `<tr><td colspan="6" class="text-danger text-center py-4">Error de conexión con el servidor.</td></tr>`;
            }
        }

        // 3. Pintar los datos en la tabla
        function renderizarTabla(socios) {
            const tbody = document.getElementById("tablaSocios");
            tbody.innerHTML = "";

            if (socios.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-secondary py-4">No se encontraron socios que coincidan.</td></tr>`;
                return;
            }

            const hoy = new Date();

            socios.forEach(socio => {
                const fechaVencimiento = new Date(socio.fechaVencimientoCuota);
                const estaVencida = fechaVencimiento < hoy;

                const fechaLegible = fechaVencimiento.toLocaleDateString('es-AR');

                // Ajuste visual de los badges para Dark Mode
                const badgeEstado = estaVencida 
                    ? '<span class="badge bg-danger px-2 py-1">Vencida</span>' 
                    : '<span class="badge bg-success px-2 py-1">Al Día</span>';

                // Botones ajustados: verde para cobrar, outline gris para pagado
                const botonCobrar = estaVencida
                    ? `<button class="btn btn-success btn-sm fw-bold px-3" onclick="registrarPagoEfectivo('${socio.dni}', '${socio.nombre}')"><i class="bi bi-cash-stack me-1"></i> Cobrar</button>`
                    : `<button class="btn btn-outline-secondary btn-sm px-3" disabled><i class="bi bi-check2-all me-1"></i> Pagado</button>`;

                const tr = document.createElement("tr");
                // Cambiado text-secondary por color personalizado o blanco para mejor lectura
                tr.innerHTML = `
                    <td class="fw-bold" style="color: var(--gym-yellow);">${socio.dni}</td>
                    <td class="fw-medium">${socio.nombre} ${socio.apellido}</td>
                    <td>${socio.telefono || '-'}</td>
                    <td>${fechaLegible}</td>
                    <td>${badgeEstado}</td>
                    <td class="text-center">${botonCobrar}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 4. Lógica de Filtrado
        function aplicarFiltros() {
            const textoBusqueda = document.getElementById("searchInput").value.toLowerCase();
            const estadoFiltro = document.getElementById("statusFilter").value;
            const hoy = new Date();

            const sociosFiltrados = todosLosSocios.filter(socio => {
                const nombreCompleto = `${socio.nombre} ${socio.apellido}`.toLowerCase();
                const coincideTexto = nombreCompleto.includes(textoBusqueda) || socio.dni.toString().includes(textoBusqueda);

                const fechaVencimiento = new Date(socio.fechaVencimientoCuota);
                const estaVencida = fechaVencimiento < hoy;

                let coincideEstado = true;
                if (estadoFiltro === "activa") coincideEstado = !estaVencida;
                if (estadoFiltro === "vencida") coincideEstado = estaVencida;

                return coincideTexto && coincideEstado;
            });

            renderizarTabla(sociosFiltrados);
        }

        // 5. Escuchadores de eventos
        document.getElementById("searchInput").addEventListener("input", aplicarFiltros);
        document.getElementById("statusFilter").addEventListener("change", aplicarFiltros);

        // 6. Procesar el pago manual en efectivo
        async function registrarPagoEfectivo(dni, nombre) {
            const confirmacion = confirm(`¿Confirmas que recibiste el pago en efectivo de ${nombre} (DNI: ${dni})?`);
            if (!confirmacion) return;

            const token = localStorage.getItem("jwt_token");

            try {
                const response = await fetch(`/api/pagos/efectivo/${dni}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const mensaje = await response.text();
                    alert(`✅ ¡Listo! ${mensaje}`);
                    
                    await cargarSocios(token);
                } else {
                    const errorMsg = await response.text();
                    alert(`❌ Error del servidor: ${errorMsg}`);
                }
            } catch (error) {
                alert(`❌ Error de conexión al intentar registrar el pago.`);
            }
        }

        // 7. Función para cerrar sesión
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html"; 
        }

        // Funciones para el Modal de Precio
        async function cargarPrecioActual() {
            const token = localStorage.getItem("jwt_token");
            try {
                const response = await fetch("/api/configuracion/precio", {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (response.ok) {
                    const precio = await response.json();
                    document.getElementById("inputPrecio").value = precio;
                }
            } catch (error) {
                console.error("Error al cargar el precio", error);
            }
        }

        async function guardarNuevoPrecio() {
            const token = localStorage.getItem("jwt_token");
            const nuevoPrecio = parseFloat(document.getElementById("inputPrecio").value);
            const alerta = document.getElementById("alertaPrecio");

            if (!nuevoPrecio || nuevoPrecio <= 0) {
                alerta.innerHTML = `<div class="alert bg-warning text-dark border-0 py-2 mt-3">Ingresa un valor válido.</div>`;
                return;
            }

            try {
                const response = await fetch("/api/configuracion/precio", {
                    method: "PUT",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ precio: nuevoPrecio })
                });

                if (response.ok) {
                    alerta.innerHTML = `<div class="alert bg-success text-white border-0 py-2 mt-3">¡Precio actualizado con éxito!</div>`;
                    setTimeout(() => {
                        alerta.innerHTML = "";
                        const modal = bootstrap.Modal.getInstance(document.getElementById('modalPrecio'));
                        modal.hide();
                    }, 1500);
                } else {
                    alerta.innerHTML = `<div class="alert bg-danger text-white border-0 py-2 mt-3">Error al guardar.</div>`;
                }
            } catch (error) {
                alerta.innerHTML = `<div class="alert bg-danger text-white border-0 py-2 mt-3">Error de conexión.</div>`;
            }
        }
    </script>
</body>
</html>
