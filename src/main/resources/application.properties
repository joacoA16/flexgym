spring.application.name=management
# Configuración de Meta
whatsapp.api.url=https://graph.facebook.com/v25.0
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.api.template-name=hello_world
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
# Configuración de Spring Mail (SMTP de Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuración de PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL base de la aplicación (en tu PC será ngrok, en producción será tu dominio)
app.base-url=${APP_BASE_URL:http://localhost:8080}
