<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio - Mi Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">GimnasioFit</span>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-5">
                <i class="bi bi-person-bounding-box display-1 text-primary mb-3"></i>
                <h2 id="saludoSocio" class="mb-4">¡Hola!</h2>
                
                <div class="p-4 bg-info bg-opacity-10 rounded mb-4 border border-info">
                    <h5 class="text-info-emphasis">Gestión de Cuota</h5>
                    <p class="mb-1">Valor mensual: <strong id="valorCuota"></strong></p>
                </div>

                <button id="btnPagar" class="btn btn-primary btn-lg w-100 mb-3" onclick="generarPago()">
                    <i class="bi bi-credit-card"></i> Pagar Cuota con Mercado Pago
                </button>
                
                <div id="pagoAlert"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Verificación de Seguridad: Al abrir la página revisamos si hay token
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("jwt_token");
            const nombre = localStorage.getItem("usuario_nombre");

            if (!token) {
                // Si no hay token, lo echamos al login
                window.location.href = "login.html";
                return;
            }

            // Saludamos al socio
            document.getElementById("saludoSocio").innerText = `¡Hola, ${nombre}!`;
        });

        // 2. Función para generar el link de Mercado Pago
        async function generarPago() {
            const token = localStorage.getItem("jwt_token");
            const dni = localStorage.getItem("usuario_dni");
            const btn = document.getElementById("btnPagar");
            const alertContainer = document.getElementById("pagoAlert");

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Generando pago seguro...`;
            alertContainer.innerHTML = "";

            try {
                const response = await fetch("/api/pagos/mercado-pago/link", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` // Inyectamos el JWT
                    },
                    body: JSON.stringify({
                        dniSocio: dni,
                        monto: 15000.0 // Monto fijo o dinámico
                    })
                });

               if (response.ok) {
                    // 1. Le decimos que lo que recibe es un JSON
                    const data = await response.json(); 
                    
                    // 2. Ingresamos a la propiedad 'url' de ese JSON y redirigimos
                    window.location.href = data.url; 
                } else {
                    const error = await response.text();
                    mostrarError(`Error de Mercado Pago: ${error}`);
                }
            } catch (error) {
                mostrarError("No se pudo contactar al servidor de pagos.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-credit-card"></i> Pagar Cuota con Mercado Pago`;
            }
        }

        function mostrarError(msj) {
            document.getElementById("pagoAlert").innerHTML = `<div class="alert alert-danger mt-3">${msj}</div>`;
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
