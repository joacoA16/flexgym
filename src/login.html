<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0"><i class="bi bi-person-circle"></i> Ingreso al Sistema</h4>
        </div>
        <div class="card-body p-4">
            <form id="loginForm">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Perfil</label>
                    <select id="perfilSelect" class="form-select">
                        <option value="socio">Socio</option>
                        <option value="profe">Profesor / Admin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tu DNI</label>
                    <input type="text" id="dniInput" class="form-control" placeholder="Ej: 40123456" required>
                </div>
                
                <div class="mb-4" id="divPassword" style="display: none;">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Clave de administrador">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>
            </form>
            
            <div id="loginAlert" class="mt-3"></div>
        </div>
    </div>

    <script>
        // Lógica para mostrar/ocultar la contraseña según el perfil
        const perfilSelect = document.getElementById("perfilSelect");
        const divPassword = document.getElementById("divPassword");

        perfilSelect.addEventListener("change", () => {
            if (perfilSelect.value === "profe") {
                divPassword.style.display = "block";
            } else {
                divPassword.style.display = "none";
            }
        });

        // Lógica del envío del formulario
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const dni = document.getElementById("dniInput").value.trim();
            const perfil = perfilSelect.value;
            const password = document.getElementById("passwordInput").value.trim();
            const alertContainer = document.getElementById("loginAlert");
            
            const url = perfil === "socio" ? "http://localhost:8080/api/auth/socio" : "http://localhost:8080/api/auth/profe";

            // Armamos el payload dinámicamente: Si es profe mandamos la clave, si es socio solo el DNI
            const payload = perfil === "socio" ? { dni: dni } : { dni: dni, password: password };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload) // <--- Aquí inyectamos el JSON
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("usuario_nombre", data.nombre);
                    localStorage.setItem("usuario_dni", dni);
                    
                    if (data.rol === "ROLE_SOCIO") {
                        window.location.href = "panel-socio.html";
                    } else {
                        window.location.href = "panel-profe.html";
                    }
                } else {
                    mostrarAlerta("Credenciales incorrectas o error de acceso.", "danger");
                }
            } catch (error) {
                mostrarAlerta("No se pudo conectar con el servidor.", "danger");
            }
        });

        function mostrarAlerta(mensaje, tipo) {
            document.getElementById("loginAlert").innerHTML = `<div class="alert alert-${tipo}">${mensaje}</div>`;
        }
    </script>
</body>
</html>
